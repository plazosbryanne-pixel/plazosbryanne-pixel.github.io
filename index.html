<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBSITE NI BRY</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Musta ka?</h1>

<div class="buttons">
    

    <button id="yesBtn">Okay lang</button>
    <button id="noBtn">Hindi okay</button>

<p id="message"></p>

<script>

  const yesBtn = document.getElementById("yesBtn");
  const noBtn = document.getElementById("noBtn");
        const message = document.getElementById("message");
let oCount = 1;

        yesBtn.addEventListener("click", () => {
            message.textContent = "MABUTI NAMAN YEHEYYYY";
        });

        noBtn.addEventListener("click", () => {
            message.textContent = "Hala WHY" + "Y".repeat(oCount);
            oCount++;
        });
</script>


</div>

</body>
</html>
