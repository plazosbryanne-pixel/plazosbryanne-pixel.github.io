<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOI MWHEHEHEH</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Musta ka Pa?</h1>

<div>

<button id="yesBtn">Okay lang</button>
<button id="noBtn">Hindi okay</button>

</div>

<p id="message"></p>


<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");

let noCount = 0;

noBtn.addEventListener("click", () => {
    noCount++;
    message.textContent = "BAKET" + "T".repeat(noCount * 2) + "!";
});

yesBtn.addEventListener("click", () => {
    message.textContent = "MABUTI NAMAN YEHEYYY ❤️";
});

</script>

</body>
</html>
